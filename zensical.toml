# ----------------------------------------------------------------------------
# Theme Configuration
# ----------------------------------------------------------------------------
[project.theme]

variant = "modern"
favicon = "assets/favicon.png"
language = "en"

features = [
    "announce.dismiss",
    "content.action.edit",
    "content.action.view",
    "content.code.annotate",
    "content.code.copy",
    "content.code.select",
    "content.footnote.tooltips",
    "content.tabs.link",
    "content.tooltips",
    "navigation.footer",
    "navigation.path",
    "navigation.tabs",
    "navigation.top",
    "search.highlight",
]

[project.theme.icon]
logo = "simple/owasp"
annotation = "material/plus-circle"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "black"
accent = "blue"
toggle.icon = "material/toggle-switch"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "black"
accent = "blue"
toggle.icon = "material/toggle-switch-off-outline"
toggle.name = "Switch to light mode"

[project.theme.font]
text = "Lato"
code = "Fira Code"

# ----------------------------------------------------------------------------
# Social Links
# ----------------------------------------------------------------------------
[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/owasp-amass"

[[project.extra.social]]
icon = "fontawesome/brands/docker"
link = "https://github.com/owasp-amass/amass-docker-compose"

[[project.extra.social]]
icon = "fontawesome/brands/discord"
link = "https://discord.gg/HNePVyX3cp"

[[project.extra.social]]
icon = "fontawesome/brands/mastodon"
link = "https://infosec.exchange/@amass"

[[project.extra.social]]
icon = "fontawesome/brands/x-twitter"
link = "https://x.com/owaspamass/"

# ----------------------------------------------------------------------------
# Markdown Extensions
# ----------------------------------------------------------------------------
[project.markdown_extensions]

abbr = {}
admonition = {}
attr_list = {}
def_list = {}
footnotes = {}
md_in_html = {}
toc = { permalink = true }
tables = {}

[project.markdown_extensions."pymdownx.arithmatex"]
generic = true

[project.markdown_extensions."pymdownx.betterem"]
smart_enable = "all"

[project.markdown_extensions."pymdownx.caret"]
[project.markdown_extensions."pymdownx.details"]

[project.markdown_extensions."pymdownx.emoji"]
emoji_index = "zensical.extensions.emoji.twemoji"
emoji_generator = "zensical.extensions.emoji.to_svg"

[project.markdown_extensions."pymdownx.highlight"]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true

[project.markdown_extensions."pymdownx.inlinehilite"]
[project.markdown_extensions."pymdownx.snippets"]
[project.markdown_extensions."pymdownx.keys"]
[project.markdown_extensions."pymdownx.mark"]
[project.markdown_extensions."pymdownx.smartsymbols"]

[project.markdown_extensions."pymdownx.superfences"]
custom_fences = [
    { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
]

[project.markdown_extensions."pymdownx.tabbed"]
alternate_style = true

[project.markdown_extensions."pymdownx.tasklist"]
custom_checkbox = true

[project.markdown_extensions."pymdownx.tilde"]
